<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>별 적립 트래커</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f5f5;
    --surface: #ffffff;
    --border: #e8e8e8;
    --border-strong: #d0d0d0;
    --text: #111111;
    --text-2: #555555;
    --text-3: #999999;
    --star: #f0b429;
    --star-bg: #fffbf0;
    --star-border: #f0e0a0;
    --radius: 16px;
    --radius-sm: 10px;
  }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 32px 24px 60px;
    max-width: 860px;
    margin: 0 auto;
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
  }

  .title {
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .title-star { font-size: 20px; }

  .btn-add {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 9px 18px;
    background: var(--text);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    letter-spacing: -0.01em;
    transition: opacity 0.15s;
  }
  .btn-add:hover { opacity: 0.75; }
  .btn-add svg { width: 14px; height: 14px; stroke: #fff; flex-shrink: 0; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
    gap: 12px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px 18px 18px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    position: relative;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .card:hover {
    border-color: var(--border-strong);
    box-shadow: 0 2px 16px rgba(0,0,0,0.06);
  }

  .card-top-btns {
    position: absolute;
    top: 11px;
    right: 11px;
    display: flex;
    gap: 4px;
  }
  .icon-btn {
    background: none;
    border: none;
    cursor: pointer;
    padding: 3px;
    color: var(--text-3);
    transition: color 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 6px;
  }
  .icon-btn:hover { color: #555; background: #f0f0f0; }
  .icon-btn svg { width: 13px; height: 13px; stroke: currentColor; }

  .name-edit-wrap { width: 100%; display: flex; align-items: center; gap: 6px; }
  .name-input-inline {
    flex: 1;
    font-size: 15px;
    font-weight: 600;
    text-align: center;
    border: none;
    border-bottom: 1.5px solid var(--border-strong);
    border-radius: 0;
    background: transparent;
    color: var(--text);
    font-family: inherit;
    outline: none;
    padding: 2px 4px;
  }
  .name-input-inline:focus { border-bottom-color: #888; }

  .avatar {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: #f0f0f0;
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 17px;
    font-weight: 600;
    color: var(--text-2);
    margin-top: 4px;
    flex-shrink: 0;
  }

  .member-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    text-align: center;
  }

  .star-box {
    width: 100%;
    background: var(--star-bg);
    border: 1px solid var(--star-border);
    border-radius: var(--radius-sm);
    padding: 12px 16px;
    text-align: center;
  }
  .star-num {
    font-size: 30px;
    font-weight: 600;
    color: var(--star);
    line-height: 1;
  }
  .star-label {
    font-size: 11px;
    color: var(--text-3);
    margin-top: 3px;
    letter-spacing: 0.02em;
  }

  .stars-row {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 2px;
    min-height: 20px;
  }
  .star-icon { font-size: 13px; line-height: 1; }
  .no-star { font-size: 12px; color: var(--text-3); }

  .actions {
    display: flex;
    gap: 8px;
    width: 100%;
  }

  .btn-minus {
    width: 38px;
    height: 36px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: none;
    font-size: 18px;
    color: var(--text-3);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, color 0.15s;
    flex-shrink: 0;
    font-family: inherit;
  }
  .btn-minus:hover { background: #f5f5f5; color: var(--text-2); }

  .btn-plus {
    flex: 1;
    height: 36px;
    border: none;
    border-radius: var(--radius-sm);
    background: var(--star);
    color: #fff;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: opacity 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
  }
  .btn-plus:hover { opacity: 0.85; }
  .btn-plus svg { width: 13px; height: 13px; stroke: #fff; flex-shrink: 0; }

  /* Log */
  .log-section {
    margin-top: 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
  }
  .log-title {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-3);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .log-title svg { width: 13px; height: 13px; stroke: var(--text-3); }
  .log-item {
    font-size: 13px;
    color: var(--text-2);
    padding: 7px 0;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
  }
  .log-item:last-child { border-bottom: none; }
  .log-time { font-size: 11px; color: var(--text-3); flex-shrink: 0; }

  /* Empty */
  .empty {
    text-align: center;
    padding: 48px 20px;
    color: var(--text-3);
    grid-column: 1 / -1;
  }
  .empty svg { width: 36px; height: 36px; stroke: #ccc; display: block; margin: 0 auto 12px; }
  .empty p { font-size: 14px; }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 28px 24px;
    width: 300px;
    box-shadow: 0 16px 48px rgba(0,0,0,0.12);
  }
  .modal h3 { font-size: 16px; font-weight: 600; margin-bottom: 16px; }
  .modal input {
    width: 100%;
    padding: 10px 13px;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-sm);
    font-family: inherit;
    font-size: 14px;
    color: var(--text);
    background: var(--bg);
    outline: none;
    transition: border-color 0.15s;
    margin-bottom: 16px;
  }
  .modal input:focus { border-color: #aaa; }
  .modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
  .modal-btns button {
    padding: 9px 18px;
    border-radius: var(--radius-sm);
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .btn-cancel { background: none; border: 1px solid var(--border-strong); color: var(--text-2); }
  .btn-cancel:hover { background: var(--bg); }
  .btn-confirm { background: var(--text); border: none; color: #fff; }
  .btn-confirm:hover { opacity: 0.75; }
</style>
</head>
<body>

<div class="header">
  <div class="title">
    <span class="title-star">⭐</span>별 적립 현황
  </div>
  <button class="btn-add" onclick="openModal()">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    멤버 추가
  </button>
</div>

<div class="grid" id="grid"></div>

<div class="log-section" id="log-section" style="display:none">
  <div class="log-title">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    최근 활동
  </div>
  <div id="log-list"></div>
</div>

<div class="modal-overlay" id="modal" onclick="handleOverlayClick(event)">
  <div class="modal">
    <h3>새 멤버 추가</h3>
    <input id="name-input" placeholder="이름을 입력하세요" onkeydown="if(event.key==='Enter') confirmAdd()" />
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn-confirm" onclick="confirmAdd()">추가</button>
    </div>
  </div>
</div>

<script>
const _saved = localStorage.getItem('star-members');
let members = _saved ? JSON.parse(_saved) : [
  { id: 1, name: '김민준', stars: 5 },
  { id: 2, name: '이서연', stars: 3 },
  { id: 3, name: '박지훈', stars: 7 },
];
let nextId = Math.max(...members.map(m => m.id), 0) + 1;
let logs = JSON.parse(localStorage.getItem('star-logs') || '[]');

function save() {
  try {
    localStorage.setItem('star-members', JSON.stringify(members));
    localStorage.setItem('star-logs', JSON.stringify(logs));
  } catch(e) {}
}

function getInitials(name) { return name.slice(0, 2); }

function renderStars(count) {
  if (count === 0) return '<span class="no-star">아직 없음</span>';
  const show = Math.min(count, 10);
  let h = '';
  for (let i = 0; i < show; i++) h += '<span class="star-icon">⭐</span>';
  if (count > 10) h += `<span style="font-size:11px;color:#999;margin-left:2px">+${count-10}</span>`;
  return h;
}

const closeSVG = `<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`;
const plusSVG = `<svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`;
const editSVG = `<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`;
const checkSVG = `<svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;

function render() {
  const sorted = [...members].sort((a, b) => b.stars - a.stars);
  const grid = document.getElementById('grid');
  if (!members.length) {
    grid.innerHTML = `<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg><p>멤버를 추가해보세요</p></div>`;
    return;
  }
  grid.innerHTML = sorted.map(m => `
    <div class="card" id="card-${m.id}">
      <div class="card-top-btns">
        <button class="icon-btn" onclick="startEdit(${m.id})" title="이름 수정">${editSVG}</button>
        <button class="icon-btn" onclick="deleteMember(${m.id})" title="삭제">${closeSVG}</button>
      </div>
      <div class="avatar">${getInitials(m.name)}</div>
      <div class="member-name" id="name-display-${m.id}">${m.name}</div>
      <div class="star-box">
        <div class="star-num">${m.stars}</div>
        <div class="star-label">적립된 별</div>
      </div>
      <div class="stars-row">${renderStars(m.stars)}</div>
      <div class="actions">
        <button class="btn-minus" onclick="change(${m.id},-1)">−</button>
        <button class="btn-plus" onclick="change(${m.id},1)">${plusSVG} 별 추가</button>
      </div>
    </div>`).join('');
}

function startEdit(id) {
  const m = members.find(x => x.id === id);
  if (!m) return;
  const nameEl = document.getElementById(`name-display-${id}`);
  if (!nameEl) return;
  nameEl.outerHTML = `
    <div class="name-edit-wrap" id="name-display-${id}">
      <input class="name-input-inline" id="name-edit-input-${id}" value="${m.name}"
        onkeydown="if(event.key==='Enter') confirmEdit(${id}); if(event.key==='Escape') render();"
      />
      <button class="icon-btn" onclick="confirmEdit(${id})" title="저장">${checkSVG}</button>
    </div>`;
  setTimeout(() => {
    const inp = document.getElementById(`name-edit-input-${id}`);
    if (inp) { inp.focus(); inp.select(); }
  }, 30);
}

function confirmEdit(id) {
  const inp = document.getElementById(`name-edit-input-${id}`);
  if (!inp) return;
  const val = inp.value.trim();
  if (!val) return;
  const m = members.find(x => x.id === id);
  if (!m) return;
  const oldName = m.name;
  m.name = val;
  if (oldName !== val) addLog(`✏️ ${oldName} → ${val}`);
  save();
  // 전체 재렌더링 대신 해당 카드만 업데이트
  const card = document.getElementById(`card-${id}`);
  if (!card) { render(); return; }
  card.querySelector('.avatar').textContent = getInitials(val);
  const nameWrap = document.getElementById(`name-display-${id}`);
  if (nameWrap) nameWrap.outerHTML = `<div class="member-name" id="name-display-${id}">${val}</div>`;
}

function change(id, delta) {
  const m = members.find(x => x.id === id);
  if (!m) return;
  const prev = m.stars;
  m.stars = Math.max(0, m.stars + delta);
  if (m.stars !== prev) {
    const msg = delta > 0 ? `⭐ ${m.name} +1개 → 총 ${m.stars}개` : `${m.name} −1개 → 총 ${m.stars}개`;
    addLog(msg);
    save();
    updateCardStars(id);
  }
}

function updateCardStars(id) {
  const m = members.find(x => x.id === id);
  if (!m) return;
  const card = document.getElementById(`card-${id}`);
  if (!card) { render(); return; }
  card.querySelector('.star-num').textContent = m.stars;
  card.querySelector('.stars-row').innerHTML = renderStars(m.stars);
}

function deleteMember(id) {
  if (!confirm('멤버를 삭제할까요?')) return;
  const m = members.find(x => x.id === id);
  members = members.filter(x => x.id !== id);
  if (m) addLog(`${m.name} 삭제`);
  save();
  render();
}

function addLog(msg) {
  const time = new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
  logs.unshift({ msg, time });
  if (logs.length > 8) logs.pop();
  document.getElementById('log-section').style.display = 'block';
  document.getElementById('log-list').innerHTML = logs.map(l =>
    `<div class="log-item"><span>${l.msg}</span><span class="log-time">${l.time}</span></div>`
  ).join('');
}

function openModal() {
  document.getElementById('modal').classList.add('open');
  setTimeout(() => document.getElementById('name-input').focus(), 50);
}
function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.getElementById('name-input').value = '';
}
function handleOverlayClick(e) { if (e.target === document.getElementById('modal')) closeModal(); }
function confirmAdd() {
  const val = document.getElementById('name-input').value.trim();
  if (!val) return;
  members.push({ id: nextId++, name: val, stars: 0 });
  addLog(`${val} 추가`);
  save();
  closeModal();
  render();
}

if (logs.length) {
  document.getElementById('log-section').style.display = 'block';
  document.getElementById('log-list').innerHTML = logs.map(l =>
    `<div class="log-item"><span>${l.msg}</span><span class="log-time">${l.time}</span></div>`
  ).join('');
}
render();
</script>
</body>
</html>
